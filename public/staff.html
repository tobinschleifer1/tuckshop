<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuck Shop — Staff Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Guard — kick anyone who isn't logged in back to the staff login page
    if (sessionStorage.getItem('staffLoggedIn') !== 'true') {
      window.location.href = 'staff-login.html';
    }
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <h1>Staff Dashboard</h1>
      <div class="header-actions">
        <button class="header-btn" onclick="window.location.href='manage-menu.html'">Menu</button>
        <button class="header-btn" onclick="window.location.href='upload.html'">Students</button>
        <button class="header-btn" onclick="staffLogout()">Log out</button>
      </div>
    </header>

    <main class="page-content">

      <!-- Verify a confirmation code the student reads out -->
      <div class="verify-bar">
        <input type="text" id="verifyInput" class="input-field" placeholder="Enter code to verify"
               maxlength="5" style="text-transform:uppercase; letter-spacing:3px; font-weight:700; text-align:center;" />
        <button class="btn btn-primary" id="verifyBtn" style="width:auto; padding:12px 18px;">Verify</button>
      </div>
      <p id="verifyResult" class="verify-result hidden"></p>

      <!-- Pending and collected counts -->
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-number" id="pendingCount">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card green">
          <div class="stat-number" id="collectedCount">0</div>
          <div class="stat-label">Collected</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="morning_tea">Morning Tea</button>
        <button class="tab-btn" data-filter="lunch">Lunch</button>
      </div>

      <!-- Orders grouped by date are injected here -->
      <div id="orderList"></div>

    </main>
  </div>

  <script>
    // Log out — clear the staff flag and return to the main login page
    function staffLogout() {
      sessionStorage.removeItem('staffLoggedIn');
      window.location.href = 'login.html';
    }

    let currentFilter = 'all';

    // --- Filter tab handlers ---
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        loadOrders();
      });
    });

    // --- Fetch orders from the API ---
    async function loadOrders() {
      const url = currentFilter === 'all'
        ? '/api/orders'
        : `/api/orders?break=${currentFilter}`;
      const response = await fetch(url);
      const orders = await response.json();
      renderOrders(orders);
      updateStats(orders);
    }

    // ─── Date helpers ────────────────────────────────────────────────
    // Get YYYY-MM-DD string for a given Date
    function dateKey(d) {
      return d.toISOString().split('T')[0];
    }

    // Friendly label for a date group: Today / Yesterday / Day, Month
    function dateLabel(dateStr) {
      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(today.getDate() - 1);

      if (dateStr === dateKey(today))     return 'Today';
      if (dateStr === dateKey(yesterday)) return 'Yesterday';

      // For older orders, show the actual date like "Mon, 3 Jun"
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-NZ', {
        weekday: 'short', day: 'numeric', month: 'short'
      });
    }

    // Group orders into an object keyed by date string
    function groupByDate(orders) {
      const groups = {};
      orders.forEach(order => {
        const key = dateKey(new Date(order.date));
        if (!groups[key]) groups[key] = [];
        groups[key].push(order);
      });
      return groups;
    }

    // ─── Rendering ───────────────────────────────────────────────────
    function renderOrders(orders) {
      const list = document.getElementById('orderList');
      list.innerHTML = '';

      if (orders.length === 0) {
        list.innerHTML = `
          <div class="empty-msg">
            <strong>No orders yet</strong>
            Pre-orders will appear here as students place them.
          </div>`;
        return;
      }

      const groups = groupByDate(orders);
      const todayKey = dateKey(new Date());

      // Render groups in date order (newest first)
      const sortedKeys = Object.keys(groups).sort().reverse();

      sortedKeys.forEach(key => {
        // Date group header
        const header = document.createElement('div');
        const isToday = key === todayKey;
        header.className = `date-group-header ${isToday ? 'today' : ''}`;
        header.textContent = dateLabel(key);
        list.appendChild(header);

        // Order cards in this date group
        groups[key].forEach(order => {
          list.appendChild(buildOrderCard(order, isToday));
        });
      });
    }

    function buildOrderCard(order, isToday) {
      const card = document.createElement('div');
      const classes = ['order-card', 'card'];
      if (order.cancelled) classes.push('cancelled-order');
      else if (order.collected) classes.push('collected');
      if (isToday && !order.collected && !order.cancelled) classes.push('new-today');
      card.className = classes.join(' ');
      card.id = `order-${order.code}`; // lets the verify box scroll to this card

      const itemsList = order.items.map(i => `${i.name} × ${i.quantity}`).join(', ');
      const breakLabel = order.break_time === 'morning_tea' ? 'Morning Tea' : 'Lunch';
      const orderDate = new Date(order.date);
      const timeStr = orderDate.toLocaleTimeString('en-NZ', {
        hour: '2-digit', minute: '2-digit'
      });

      // NEW badge only on today's active (pending) orders
      const newBadge = (isToday && !order.collected && !order.cancelled)
        ? '<span class="new-badge">New</span>'
        : '';

      // The action/status area depends on the order's state
      let actionHtml;
      if (order.cancelled) {
        actionHtml = `<div class="cancelled-badge">Cancelled${order.cancelled_by ? ' by ' + order.cancelled_by : ''}</div>`;
      } else if (order.collected) {
        actionHtml = `<div class="collected-badge">Collected</div>`;
      } else {
        actionHtml = `
          <div class="order-actions">
            <button class="btn btn-success collected-btn" onclick="markCollected(${order.id})">Mark Collected</button>
            <button class="btn-cancel-order" onclick="cancelOrder(${order.id})">Cancel</button>
          </div>`;
      }

      card.innerHTML = `
        <div class="order-card-header">
          <div class="avatar">${order.school_number.charAt(0)}</div>
          <div class="order-student-info">
            <div class="order-school-no">${order.school_number}</div>
            <div class="order-time">${timeStr} ${newBadge}</div>
          </div>
          <span class="break-tag ${order.break_time}">${breakLabel}</span>
        </div>

        <div class="order-items">${itemsList}</div>

        <div class="order-card-footer">
          <span class="order-code">Code <strong>${order.code || '—'}</strong></span>
          <span class="order-total">$${order.total.toFixed(2)}</span>
        </div>

        ${actionHtml}
      `;
      return card;
    }

    function updateStats(orders) {
      // Pending = not collected and not cancelled
      const pending = orders.filter(o => !o.collected && !o.cancelled).length;
      const collected = orders.filter(o => o.collected).length;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('collectedCount').textContent = collected;
    }

    // Mark an order as collected and refresh
    async function markCollected(orderId) {
      await fetch(`/api/orders/${orderId}/collected`, { method: 'PUT' });
      loadOrders();
    }

    // Cancel an order from the staff side (after confirming)
    async function cancelOrder(orderId) {
      if (!confirm('Cancel this order? The student will see it was cancelled.')) return;
      await fetch(`/api/orders/${orderId}/cancel`, { method: 'PUT' });
      loadOrders();
    }

    // ─── Verify a confirmation code a student reads out ───
    async function verifyCode() {
      const code = document.getElementById('verifyInput').value.trim().toUpperCase();
      const resultEl = document.getElementById('verifyResult');
      if (!code) return;

      const response = await fetch(`/api/order/${code}`);
      if (!response.ok) {
        resultEl.className = 'verify-result bad';
        resultEl.textContent = `✗ No order found for code ${code}`;
        resultEl.classList.remove('hidden');
        return;
      }

      const order = await response.json();
      const items = order.items.map(i => `${i.name} × ${i.quantity}`).join(', ');

      // Decide the verdict shown to staff
      let verdict;
      if (order.cancelled) verdict = `CANCELLED${order.cancelled_by ? ' by ' + order.cancelled_by : ''}`;
      else if (order.collected) verdict = 'ALREADY COLLECTED';
      else verdict = 'VALID — not yet collected';

      resultEl.className = (order.cancelled || order.collected) ? 'verify-result bad' : 'verify-result good';
      resultEl.innerHTML =
        `${(order.cancelled || order.collected) ? '✗' : '✓'} <strong>${code}</strong> · ${order.school_number} · ${items} · $${order.total.toFixed(2)} — ${verdict}`;
      resultEl.classList.remove('hidden');

      // Scroll to and flash the matching card if it is currently shown
      const card = document.getElementById(`order-${code}`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('flash');
        setTimeout(() => card.classList.remove('flash'), 1600);
      }
    }

    document.getElementById('verifyBtn').addEventListener('click', verifyCode);
    document.getElementById('verifyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyCode();
    });

    // Initial load + auto-refresh every 10 seconds so staff don't have to refresh
    loadOrders();
    setInterval(loadOrders, 10000);
  </script>
</body>
</html>
