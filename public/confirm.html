<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuck Shop — Review Order</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Editable review rows */
    .review-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .review-item:last-child { border-bottom: none; }
    .review-info { flex: 1; min-width: 0; }
    .review-name { font-size: 14px; font-weight: 600; }
    .review-each { font-size: 12px; color: var(--text-muted); }
    .review-qty { display: flex; align-items: center; gap: 8px; }
    .review-qty .qty-btn { width: 30px; height: 30px; font-size: 17px; }
    .review-line { font-weight: 700; font-size: 14px; min-width: 54px; text-align: right; }
    .review-remove {
      background: none; border: none; color: var(--red);
      font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .empty-cart { text-align: center; color: var(--text-muted); padding: 20px 0; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <h1>Review your order</h1>
    </header>

    <main class="page-content">
      <div class="card confirm-card">
        <div class="confirm-row">
          <span class="confirm-label">Name</span>
          <span id="confirmName"></span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">School No.</span>
          <span id="confirmSchoolNo"></span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Break</span>
          <span id="confirmBreak"></span>
        </div>

        <hr class="divider-line" />

        <!-- Editable item list — change quantity or remove items here -->
        <div id="confirmItems"></div>

        <hr class="divider-line" />

        <div class="confirm-row total-row">
          <span>Total</span>
          <span id="confirmTotal" class="total-red"></span>
        </div>
      </div>

      <!-- Shown if the order is rejected (e.g. a daily limit is hit) -->
      <p id="orderError" class="error-msg hidden" style="margin-top: 14px;"></p>

      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 14px;">
        <button id="confirmBtn" class="btn btn-success">Continue to payment</button>
        <button id="cancelBtn" class="btn btn-ghost">Back to menu</button>
      </div>
    </main>
  </div>

  <script>
    const student = JSON.parse(sessionStorage.getItem('student'));
    let cart = JSON.parse(sessionStorage.getItem('cart'));
    const breakTime = sessionStorage.getItem('break');

    if (!student || !cart || !breakTime) window.location.href = 'login.html';

    document.getElementById('confirmName').textContent = student.name;
    document.getElementById('confirmSchoolNo').textContent = student.school_number;
    document.getElementById('confirmBreak').textContent =
      breakTime === 'morning_tea' ? 'Morning Tea' : 'Lunch';

    const itemsContainer = document.getElementById('confirmItems');
    const confirmBtn = document.getElementById('confirmBtn');

    // Render the editable item list and the running total
    function renderItems() {
      itemsContainer.innerHTML = '';
      const entries = Object.values(cart);

      if (entries.length === 0) {
        itemsContainer.innerHTML = '<div class="empty-cart">Your order is empty.</div>';
        document.getElementById('confirmTotal').textContent = '$0.00';
        confirmBtn.disabled = true;
        confirmBtn.style.opacity = '0.5';
        return;
      }

      confirmBtn.disabled = false;
      confirmBtn.style.opacity = '1';

      let total = 0;
      entries.forEach(item => {
        const lineTotal = item.price * item.quantity;
        total += lineTotal;

        const row = document.createElement('div');
        row.className = 'review-item';
        row.innerHTML = `
          <div class="review-info">
            <div class="review-name">${item.name}</div>
            <div class="review-each">$${item.price.toFixed(2)} each</div>
          </div>
          <div class="review-qty">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
          <div class="review-line">$${lineTotal.toFixed(2)}</div>
          <button class="review-remove" onclick="removeItem(${item.id})" title="Remove">×</button>
        `;
        itemsContainer.appendChild(row);
      });

      document.getElementById('confirmTotal').textContent = `$${total.toFixed(2)}`;
    }

    // Change an item's quantity (delta is +1 or -1); removing the last one deletes it
    function changeQty(id, delta) {
      if (!cart[id]) return;
      cart[id].quantity += delta;
      if (cart[id].quantity <= 0) delete cart[id];
      saveAndRender();
    }

    // Remove an item entirely
    function removeItem(id) {
      delete cart[id];
      saveAndRender();
    }

    // Persist the edited cart so the menu and payment pages stay in sync
    function saveAndRender() {
      sessionStorage.setItem('cart', JSON.stringify(cart));
      renderItems();
    }

    renderItems();

    // Continue to payment — places the order (unpaid) then goes to the payment page
    confirmBtn.addEventListener('click', async () => {
      const items = Object.values(cart);
      if (items.length === 0) return;

      const total = items.reduce((sum, i) => sum + i.price * i.quantity, 0);
      const orderPayload = {
        school_number: student.school_number,
        break_time: breakTime,
        items,
        total,
      };

      const errorEl = document.getElementById('orderError');
      errorEl.classList.add('hidden');

      try {
        const response = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderPayload),
        });
        const result = await response.json();

        if (response.ok && result.success) {
          // Order placed (unpaid). Clear the cart and head to payment.
          sessionStorage.removeItem('cart');
          sessionStorage.removeItem('break');
          window.location.href = `payment.html?code=${result.code}`;
        } else {
          errorEl.textContent = result.error || 'Could not place your order.';
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        console.error('Order submission error:', err);
        errorEl.textContent = 'Something went wrong placing your order.';
        errorEl.classList.remove('hidden');
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = 'menu.html';
    });
  </script>
</body>
</html>
