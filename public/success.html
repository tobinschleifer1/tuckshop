<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuck Shop — Order Confirmed</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .paid-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 12px;
      border-radius: 999px;
    }
    .paid-badge.paid   { background: var(--green-tint); color: var(--success-text); }
    .paid-badge.unpaid { background: var(--warning-bg); color: var(--warning-text); }
  </style>
</head>
<body>
  <!-- Success page — reached after payment, loads the order by its code -->

  <div class="app-shell">
    <header class="top-bar">
      <h1>Order Confirmed</h1>
    </header>

    <main class="page-content centered">
      <div class="card success-card">

        <div class="success-icon">✓</div>
        <h2 class="success-heading">You're all set!</h2>
        <p class="success-sub">Show this code at the tuck shop to collect your order.</p>

        <!-- Paid / unpaid status -->
        <div id="paidBadge"></div>

        <!-- Confirmation code — the student shows this to staff -->
        <div class="code-box">
          <div class="code-label">Your confirmation code</div>
          <div class="code-value" id="codeValue">—</div>
        </div>

        <hr class="divider-line" />

        <div class="receipt">
          <div class="confirm-row">
            <span class="confirm-label">School No.</span>
            <span id="receiptSchoolNo"></span>
          </div>
          <div class="confirm-row">
            <span class="confirm-label">Break</span>
            <span id="receiptBreak"></span>
          </div>

          <hr class="divider-line" />
          <div id="receiptItems"></div>
          <hr class="divider-line" />

          <div class="confirm-row total-row">
            <span>Total</span>
            <span id="receiptTotal" class="total-red"></span>
          </div>
        </div>
      </div>

      <button class="btn btn-success" id="manageBtn">Check or cancel this order</button>
      <button class="btn btn-ghost" onclick="window.location.href='login.html'">Back to login</button>
    </main>
  </div>

  <script>
    // The order code is in the URL (?code=...) after the payment redirect
    const code = new URLSearchParams(window.location.search).get('code');
    if (!code) window.location.href = 'login.html';

    // Load the order from the server and build the receipt
    async function loadOrder() {
      const response = await fetch(`/api/order/${code}`);
      if (!response.ok) {
        window.location.href = 'login.html';
        return;
      }
      const order = await response.json();

      document.getElementById('codeValue').textContent = order.code;
      document.getElementById('receiptSchoolNo').textContent = order.school_number;
      document.getElementById('receiptBreak').textContent =
        order.break_time === 'morning_tea' ? 'Morning Tea' : 'Lunch';

      // Paid / unpaid badge
      const badge = document.getElementById('paidBadge');
      badge.innerHTML = order.paid
        ? '<span class="paid-badge paid">✓ Paid</span>'
        : '<span class="paid-badge unpaid">Awaiting payment</span>';

      // Itemised list
      const itemsContainer = document.getElementById('receiptItems');
      itemsContainer.innerHTML = '';
      order.items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'confirm-row';
        row.innerHTML = `
          <span>${item.name} × ${item.quantity}</span>
          <span>$${(item.price * item.quantity).toFixed(2)}</span>
        `;
        itemsContainer.appendChild(row);
      });

      document.getElementById('receiptTotal').textContent = `$${order.total.toFixed(2)}`;

      // "Check or cancel" jumps to the status page for this code
      document.getElementById('manageBtn').addEventListener('click', () => {
        window.location.href = `order-status.html?code=${order.code}`;
      });
    }

    loadOrder();
  </script>
</body>
</html>
