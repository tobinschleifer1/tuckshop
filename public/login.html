<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tuck Shop — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <h1>Rathkeale Tuck Shop</h1>
    </header>

    <main class="page-content centered">

      <!-- Brand mark sits above the card to anchor the page -->
      <div class="brand-mark">RC</div>
      <div class="brand-title">Welcome back</div>
      <div class="brand-subtitle">Enter your school number to order</div>

      <div class="login-card card">

        <input
          type="text"
          inputmode="numeric"
          id="schoolNumberInput"
          class="input-field"
          placeholder="School number"
          maxlength="10"
          autofocus
        />

        <p id="loginError" class="error-msg hidden">School number not found — try again.</p>

        <button id="studentLoginBtn" class="btn btn-primary">Continue</button>

        <div class="divider">— OR —</div>

        <button id="staffLoginBtn" class="btn btn-secondary" onclick="window.location.href='staff-login.html'">
          Staff Login
        </button>
      </div>
    </main>
  </div>

  <script>
    // Look up student by school number when the continue button is clicked
    document.getElementById('studentLoginBtn').addEventListener('click', async () => {
      const schoolNumber = document.getElementById('schoolNumberInput').value.trim();

      // Do nothing if the input is empty
      if (!schoolNumber) return;

      try {
        const response = await fetch(`/api/student/${schoolNumber}`);

        if (!response.ok) {
          // Show the error message if the school number isn't in the database
          document.getElementById('loginError').classList.remove('hidden');
          return;
        }

        const student = await response.json();

        // Save the student in sessionStorage so other pages can read it
        sessionStorage.setItem('student', JSON.stringify(student));
        window.location.href = 'menu.html';
      } catch (err) {
        console.error('Login error:', err);
      }
    });

    // Pressing Enter in the input field also submits the login
    document.getElementById('schoolNumberInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('studentLoginBtn').click();
    });

    // Hide the error message as soon as the user starts typing again
    document.getElementById('schoolNumberInput').addEventListener('input', () => {
      document.getElementById('loginError').classList.add('hidden');
    });
  </script>
</body>
</html>
