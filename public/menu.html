<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tuck Shop — Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <h1>Menu</h1>
      <div class="header-actions">
        <span id="studentInfo" class="student-info"></span>
        <button class="header-btn" onclick="studentLogout()">Log out</button>
      </div>
    </header>

    <main class="page-content">

      <!-- Break time toggle — defaults to Morning Tea -->
      <div class="break-toggle">
        <button id="btnMorningTea" class="toggle-btn active" data-break="morning_tea">Morning Tea</button>
        <button id="btnLunch" class="toggle-btn" data-break="lunch">Lunch</button>
      </div>

      <div id="menuGrid" class="menu-grid"></div>

    </main>

    <!-- Sticky footer with live running total -->
    <footer class="order-footer hidden" id="orderFooter">
      <div class="footer-total-wrap">
        <div class="footer-total-label">Total</div>
        <div class="footer-total" id="runningTotal">$0.00</div>
      </div>
      <button class="btn btn-primary" id="viewOrderBtn">View Order</button>
    </footer>
  </div>

  <script>
    // --- State ---
    let cart = {};
    let selectedBreak = 'morning_tea';

    // Redirect to login if no student in session
    const student = JSON.parse(sessionStorage.getItem('student'));
    if (!student) window.location.href = 'login.html';

    document.getElementById('studentInfo').textContent = student.name;

    // Log out — clear the student's session and return to the login page
    function studentLogout() {
      sessionStorage.removeItem('student');
      sessionStorage.removeItem('cart');
      sessionStorage.removeItem('break');
      window.location.href = 'login.html';
    }

    // --- Break toggle ---
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedBreak = btn.dataset.break;
      });
    });

    // --- Load menu from API ---
    async function loadMenu() {
      const response = await fetch('/api/menu');
      const items = await response.json();
      renderMenu(items);
    }

    function renderMenu(items) {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = '';

      items.forEach(item => {
        const card = document.createElement('div');
        card.className = `menu-card card ${item.available ? '' : 'sold-out'}`;
        card.id = `card-${item.id}`;

        card.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div class="item-price">$${item.price.toFixed(2)}</div>
          ${item.available
            ? `<div class="qty-controls">
                <button class="qty-btn" onclick="changeQty(${item.id}, ${item.price}, '${item.name.replace(/'/g, "\\'")}', -1)">−</button>
                <span id="qty-${item.id}" class="qty-display">0</span>
                <button class="qty-btn" onclick="changeQty(${item.id}, ${item.price}, '${item.name.replace(/'/g, "\\'")}', 1)">+</button>
              </div>`
            : `<div class="sold-out-label">Sold Out</div>`
          }
        `;
        grid.appendChild(card);
      });
    }

    // Change quantity for a cart item — delta is +1 or -1
    function changeQty(id, price, name, delta) {
      if (!cart[id]) cart[id] = { id, name, price, quantity: 0 };
      cart[id].quantity += delta;

      if (cart[id].quantity < 0) cart[id].quantity = 0;
      if (cart[id].quantity === 0) delete cart[id];

      const qtyEl = document.getElementById(`qty-${id}`);
      const cardEl = document.getElementById(`card-${id}`);
      if (qtyEl) qtyEl.textContent = cart[id] ? cart[id].quantity : 0;

      // Visually highlight cards that have items added
      if (cardEl) {
        if (cart[id]) cardEl.classList.add('has-items');
        else cardEl.classList.remove('has-items');
      }

      updateTotal();
    }

    // Recalculate and show the running total in the footer
    function updateTotal() {
      const total = Object.values(cart).reduce(
        (sum, item) => sum + item.price * item.quantity, 0
      );
      document.getElementById('runningTotal').textContent = `$${total.toFixed(2)}`;

      const footer = document.getElementById('orderFooter');
      if (Object.keys(cart).length > 0) footer.classList.remove('hidden');
      else footer.classList.add('hidden');
    }

    // View Order button — saves cart and break time, navigates to confirm page
    document.getElementById('viewOrderBtn').addEventListener('click', () => {
      sessionStorage.setItem('cart', JSON.stringify(cart));
      sessionStorage.setItem('break', selectedBreak);
      window.location.href = 'confirm.html';
    });

    loadMenu();
  </script>
</body>
</html>
